<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="header-gradient"></div>
            <div class="profile-content">
                <div class="avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Student Avatar">
                </div>
                <h1 class="name">Alex Johnson</h1>
                <p class="student-id">ID: #2024-0812</p>
                <div class="info-tag">Computer Science</div>
                
                <div class="details">
                    <div class="detail-item">
                        <span class="label">University:</span>
                        <span class="value">Tech Institute of Engineering</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Year:</span>
                        <span class="value">Junior (3rd Year)</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Email:</span>
                        <span class="value">alex.j@example.edu</span>
                    </div>
                </div>
                
                <div class="social-links">
                    <button class="btn primary">View Portfolio</button>
                    <button class="btn secondary">Contact</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
