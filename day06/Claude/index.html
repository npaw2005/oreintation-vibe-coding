<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrench Tightening Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 28px;
        }

        .canvas-wrapper {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            position: relative;
        }

        svg {
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        /* Animations */
        @keyframes wrench-rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes bolt-rotate {
            0% {
                transform: rotateZ(0deg);
            }
            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes nut-move {
            0% {
                transform: translateY(0px) rotateZ(0deg);
            }
            100% {
                transform: translateY(60px) rotateZ(360deg);
            }
        }

        .wrench {
            transform-origin: 200px 200px;
            animation: wrench-rotate 4s linear infinite;
        }

        .bolt {
            transform-origin: 200px 200px;
            animation: bolt-rotate 2s linear infinite;
        }

        .nut {
            transform-origin: 200px 200px;
            animation: nut-move 4s ease-in-out infinite;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-btn {
            background-color: #4CAF50;
            color: white;
        }

        .play-btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .pause-btn {
            background-color: #ff9800;
            color: white;
        }

        .pause-btn:hover {
            background-color: #e68900;
            transform: scale(1.05);
        }

        .reset-btn {
            background-color: #f44336;
            color: white;
        }

        .reset-btn:hover {
            background-color: #da190b;
            transform: scale(1.05);
        }

        .paused {
            animation-play-state: paused !important;
        }

        .info {
            color: white;
            text-align: center;
            font-size: 14px;
            max-width: 500px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Wrench Tightening Animation</h1>
        
        <div class="canvas-wrapper">
            <svg width="400" height="400" viewBox="0 0 400 400">
                <!-- Bolt Threads -->
                <defs>
                    <pattern id="threads" x="0" y="0" width="4" height="40" patternUnits="userSpaceOnUse">
                        <line x1="200" y1="0" x2="200" y2="40" stroke="#999" stroke-width="2"/>
                        <line x1="205" y1="0" x2="205" y2="40" stroke="#999" stroke-width="1.5"/>
                        <line x1="195" y1="0" x2="195" y2="40" stroke="#999" stroke-width="1.5"/>
                    </pattern>
                </defs>

                <!-- Bolt Head and Threaded Shaft -->
                <g class="bolt">
                    <!-- Bolt Head with hexagonal appearance -->
                    <polygon points="200,80 225,90 225,110 200,120 175,110 175,90" 
                             fill="#888" stroke="#555" stroke-width="2"/>
                    
                    <!-- Hexagonal indent for realism -->
                    <polygon points="200,90 215,97 215,107 200,113 185,107 185,97" 
                             fill="#999" stroke="#444" stroke-width="1"/>
                    
                    <!-- Threaded shaft -->
                    <rect x="190" y="120" width="20" height="180" 
                          fill="#777" stroke="#555" stroke-width="1.5"/>
                    
                    <!-- Thread pattern on shaft -->
                    <g opacity="0.6">
                        <line x1="190" y1="130" x2="210" y2="130" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="145" x2="210" y2="145" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="160" x2="210" y2="160" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="175" x2="210" y2="175" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="190" x2="210" y2="190" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="205" x2="210" y2="205" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="220" x2="210" y2="220" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="235" x2="210" y2="235" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="250" x2="210" y2="250" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="265" x2="210" y2="265" stroke="#555" stroke-width="1"/>
                        <line x1="190" y1="280" x2="210" y2="280" stroke="#555" stroke-width="1"/>
                    </g>
                </g>

                <!-- Hex Nut -->
                <g class="nut">
                    <!-- Outer hexagon (nut body) -->
                    <polygon points="200,170 223,182 223,206 200,218 177,206 177,182" 
                             fill="#c0c0c0" stroke="#666" stroke-width="2"/>
                    
                    <!-- Inner hexagon (hole) -->
                    <polygon points="200,180 216,189 216,205 200,214 184,205 184,189" 
                             fill="#333" stroke="#111" stroke-width="1"/>
                    
                    <!-- Highlight for metallic effect -->
                    <polygon points="200,170 223,182 215,185 200,176" 
                             fill="#e8e8e8" opacity="0.7"/>
                    
                    <!-- Shadow for depth -->
                    <polygon points="177,206 177,182 185,189 185,205" 
                             fill="#808080" opacity="0.5"/>
                </g>

                <!-- Wrench -->
                <g class="wrench">
                    <!-- Main wrench body -->
                    <rect x="185" y="80" width="30" height="240" 
                          fill="#333" stroke="#111" stroke-width="2" rx="4"/>
                    
                    <!-- Wrench head (jaw opening) -->
                    <g>
                        <!-- Top jaw -->
                        <path d="M 190 80 L 210 80 L 215 70 L 185 70 Z" 
                              fill="#333" stroke="#111" stroke-width="2"/>
                        
                        <!-- Bottom jaw (movable appearance) -->
                        <path d="M 190 100 L 210 100 L 205 115 L 195 115 Z" 
                              fill="#2a2a2a" stroke="#111" stroke-width="2"/>
                        
                        <!-- Jaw opening outline to show it gripping the nut -->
                        <ellipse cx="200" cy="190" rx="28" ry="22" 
                                 fill="none" stroke="#666" stroke-width="2" opacity="0.5"/>
                    </g>
                    
                    <!-- Handle grip lines -->
                    <g opacity="0.6">
                        <line x1="190" y1="150" x2="210" y2="150" stroke="#555" stroke-width="1.5"/>
                        <line x1="190" y1="170" x2="210" y2="170" stroke="#555" stroke-width="1.5"/>
                        <line x1="190" y1="190" x2="210" y2="190" stroke="#555" stroke-width="1.5"/>
                        <line x1="190" y1="210" x2="210" y2="210" stroke="#555" stroke-width="1.5"/>
                        <line x1="190" y1="230" x2="210" y2="230" stroke="#555" stroke-width="1.5"/>
                    </g>
                    
                    <!-- Highlight on wrench for metallic effect -->
                    <rect x="187" y="90" width="8" height="200" 
                          fill="#555" opacity="0.6" rx="4"/>
                </g>

                <!-- Center point indicator (hidden) -->
                <circle cx="200" cy="200" r="2" fill="#999" opacity="0.3"/>
            </svg>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="playAnimation()">▶ Play</button>
            <button class="pause-btn" onclick="pauseAnimation()">⏸ Pause</button>
            <button class="reset-btn" onclick="resetAnimation()">⟲ Reset</button>
        </div>

        <div class="info">
            <p>🔧 Watch as the wrench rotates to tighten the hex nut onto the threaded bolt. 
            The nut moves down the bolt while rotating, mimicking a real tightening action.</p>
        </div>
    </div>

    <script>
        const wrench = document.querySelector('.wrench');
        const nut = document.querySelector('.nut');
        const bolt = document.querySelector('.bolt');
        const svg = document.querySelector('svg');

        function playAnimation() {
            wrench.classList.remove('paused');
            nut.classList.remove('paused');
            bolt.classList.remove('paused');
        }

        function pauseAnimation() {
            wrench.classList.add('paused');
            nut.classList.add('paused');
            bolt.classList.add('paused');
        }

        function resetAnimation() {
            // Remove and re-add the elements to restart the animation
            pauseAnimation();
            
            const parent = svg.parentElement;
            const newSvg = svg.cloneNode(true);
            svg.remove();
            parent.appendChild(newSvg);

            // Re-attach event listeners by getting new element
            setTimeout(playAnimation, 10);
        }

        // Start animation on load
        window.addEventListener('load', playAnimation);
    </script>
</body>
</html>
