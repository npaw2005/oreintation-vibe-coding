<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Wrench Tightening Nut • Animation</title>
<style>
  body {
    height: 100vh;
    margin: 0;
    background: #111;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 420px;
    height: 280px;
    perspective: 900px;
  }

  .bolt {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 38px;
    height: 160px;
    background: linear-gradient(90deg, #ccc 0%, #eee 20%, #ddd 50%, #ccc 80%);
    border-radius: 4px;
    box-shadow: 0 0 12px #0008 inset;
  }

  .threads {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      #aaa 0px, #aaa 3px, transparent 3px, transparent 9px
    );
    opacity: 0.7;
    animation: threads-move 4s linear infinite;
  }

  @keyframes threads-move {
    to { background-position: -72px 0; }
  }

  .nut {
    position: absolute;
    left: 50%;
    top: 48%;
    width: 54px;
    height: 54px;
    transform: translate(-50%, -50%) rotate(0deg);
    background: #e0c070;
    clip-path: polygon(
      50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%
    );
    box-shadow:
      0 6px 12px #0006,
      inset 0 4px 10px #fff4,
      inset 0 -6px 12px #0004;
    animation: tighten 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  @keyframes tighten {
    0%   { transform: translate(-50%, -50%) rotate(0deg)   translateY(80px); }
    90%  { transform: translate(-50%, -50%) rotate(720deg) translateY(12px); }
    100% { transform: translate(-50%, -50%) rotate(900deg) translateY(0px);  }
  }

  .wrench {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 140px;
    height: 38px;
    transform-origin: 38px 50%;
    transform: translate(-50%, -50%) rotate(-35deg);
    animation: turn-wrench 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  .wrench-body {
    position: absolute;
    inset: 0 40px 0 0;
    background: linear-gradient(#555, #444, #333, #222);
    border-radius: 12px 6px 6px 12px;
    box-shadow: 2px 0 8px #0008;
  }

  .jaw {
    position: absolute;
    right: -2px;
    top: 50%;
    width: 44px;
    height: 44px;
    transform: translateY(-50%);
    background: #444;
    clip-path: polygon(0% 20%, 100% 0%, 100% 100%, 0% 80%);
    border-radius: 0 8px 8px 0;
  }

  .handle-grip {
    position: absolute;
    left: -12px;
    top: 50%;
    width: 28px;
    height: 48px;
    transform: translateY(-50%);
    background: #2a2a2a;
    border-radius: 14px;
    box-shadow: inset 0 0 10px #0008;
  }

  @keyframes turn-wrench {
    0%   { transform: translate(-50%, -50%) rotate(-35deg); }
    10%  { transform: translate(-50%, -50%) rotate(-35deg); }
    20%  { transform: translate(-50%, -50%) rotate(25deg);  }
    30%  { transform: translate(-50%, -50%) rotate(-35deg); }
    40%  { transform: translate(-50%, -50%) rotate(25deg);  }
    50%  { transform: translate(-50%, -50%) rotate(-35deg); }
    60%  { transform: translate(-50%, -50%) rotate(25deg);  }
    70%  { transform: translate(-50%, -50%) rotate(-35deg); }
    80%  { transform: translate(-50%, -50%) rotate(25deg);  }
    90%  { transform: translate(-50%, -50%) rotate(-15deg); }
    100% { transform: translate(-50%, -50%) rotate(-5deg);  }
  }

  .spark {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #fffa80;
    border-radius: 50%;
    box-shadow: 0 0 12px #ff8, 0 0 24px #ff4;
    opacity: 0;
    pointer-events: none;
    animation: spark 1.2s ease-out infinite;
  }

  .spark:nth-child(1) { left: 48%; top: 42%; animation-delay: 0.6s; }
  .spark:nth-child(2) { left: 52%; top: 58%; animation-delay: 1.1s; }
  .spark:nth-child(3) { left: 38%; top: 50%; animation-delay: 2.2s; }

  @keyframes spark {
    0%   { transform: scale(0.2) translate(0,0); opacity: 0.9; }
    30%  { transform: scale(1.4) translate(20px, -15px); opacity: 0.9; }
    100% { transform: scale(0.3) translate(60px, -40px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="bolt">
    <div class="threads"></div>
  </div>

  <div class="nut"></div>

  <div class="wrench">
    <div class="handle-grip"></div>
    <div class="wrench-body"></div>
    <div class="jaw"></div>
  </div>

  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
</div>

</body>
</html>
