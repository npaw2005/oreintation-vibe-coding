<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Student Toolkit</div>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-icon">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <ul>
                <li><a href="#gpa-section"><i class="fas fa-calculator"></i> <span>GPA Calculator</span></a></li>
                <li><a href="#timer-section"><i class="fas fa-stopwatch"></i> <span>Pomodoro Timer</span></a></li>
                <li><a href="#idea-section"><i class="fas fa-lightbulb"></i> <span>Idea Board</span></a></li>
            </ul>
        </aside>

        <main class="content">
            <!-- ... (previous sections) ... -->
            
            <!-- Idea Board Section -->
            <section id="idea-section" class="card">
                <h2><i class="fas fa-lightbulb"></i> Idea Board</h2>
                <div class="idea-form">
                    <div class="form-group">
                        <label for="student-name">Select Student:</label>
                        <select id="student-name" class="input-field">
                            <option value="">-- Choose Name --</option>
                            <option value="Alice">Alice</option>
                            <option value="Bob">Bob</option>
                            <option value="Charlie">Charlie</option>
                            <option value="David">David</option>
                            <option value="Eve">Eve</option>
                        </select>
                    </div>
                    
                    <div class="rich-text-editor">
                        <div class="editor-toolbar">
                            <button type="button" onclick="formatDoc('bold')" title="Bold"><i class="fas fa-bold"></i></button>
                            <button type="button" onclick="formatDoc('italic')" title="Italic"><i class="fas fa-italic"></i></button>
                            <button type="button" onclick="formatDoc('insertUnorderedList')" title="List"><i class="fas fa-list-ul"></i></button>
                        </div>
                        <div id="idea-content" contenteditable="true" class="editor-area" placeholder="Write your idea here..."></div>
                    </div>
                    
                    <button id="post-idea" class="btn-primary" style="margin-top: 1rem;">Post Idea</button>
                </div>

                <div id="ideas-grid" class="ideas-grid">
                    <!-- Ideas will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Sound -->
    <audio id="bell-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
